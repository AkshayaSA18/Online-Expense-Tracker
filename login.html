<!doctype html>
<!-- HTML5 document declaration -->

<html lang="en">
  <!-- Root element -->

  <head>
    <meta charset="UTF-8" />
    <!-- Supports all characters -->

    <title>User Login</title>
    <!-- Page title -->

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #bebcbc;
      }

      .form-box {
        width: 350px;
        margin: 100px auto; /* Center form vertically */
        padding: 25px;
        background: #fff;
        border-radius: 20px;
      }
      h2 {
        text-align: center;
      }
      h1 {
        text-align: center;
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        font-size: 40px;
      }
      input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
      }

      .submit {
        width: 100%;
        padding: 10px;
        background: orange;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }

      .error {
        color: red;
        font-size: 14px;
      }

      a {
        float: right;
        text-decoration: none;
      }
      .sign-up {
        position: fixed;
        top: 15px;
        right: 20px;
        padding: 10px 18px;
        background-color: orange;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      .sign-up:hover {
        background-color: #18d150d9;
      }
      .submit:hover {
        background-color: #18d150d9;
      }
    </style>
  </head>
  <body>
    <button class="sign-up" onclick="signup()">Sign-Up</button>
    <h1>Expense Tracker</h1>
    <div class="form-box">
      <!-- Link to registration page -->

      <h2>Login</h2>

      <!-- Form submission calls loginUser() -->
      <form onsubmit="return loginUser();">
        <!-- Username input -->
        <input type="text" id="loginUsername" placeholder="Username" />

        <!-- Password input -->
        <input type="password" id="loginPassword" placeholder="Password" />

        <!-- Error message display -->
        <p class="error" id="loginError"></p>

        <!-- Login button -->
        <button type="submit" class="submit">Login</button>
      </form>
    </div>

    <script>
      function signup() {
        window.location.href = "register.html";
      }
      function expensepage() {
        window.location.href = "exp.html";
      }
      // Function runs when Login button is clicked
      function loginUser() {
        // Get input values
        let username = document.getElementById("loginUsername").value.trim();
        let password = document.getElementById("loginPassword").value;
        let error = document.getElementById("loginError");

        // Get registered user data from localStorage
        let storedUser = JSON.parse(localStorage.getItem("user"));

        // If no user registered
        if (!storedUser) {
          error.textContent = "Please register first";
          return false;
        }

        // Validate username and password
        if (
          username === storedUser.username &&
          password === storedUser.password
        ) {
          // Save login session
          localStorage.setItem("loggedIn", "true");

          // Redirect to expense tracker page
          window.location.href = "exp.html";
        } else {
          error.textContent = "Invalid username or password";
        }

        return false; // Prevent page reload
      }
    </script>
  </body>
</html>
